<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>串口调试助手</title>
    <style>
        /* 🌑 4-Color Dark Theme
             BG  #0d1117   背景
             TXT #e6edf3   主色（文字）
             ACC #58a6ff   次色（按钮/高亮）
             CMT #8b949e   注释色（标签/时间戳）
        */
        :root {
            --bg: #0d1117;
            --text: #e6edf3;
            --accent: #58a6ff;
            --comment: #8b949e;
            --raised: #161b22;
            --border: #21262d;
            --danger: #f85149;
            --success: #3fb950;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 标题栏 ===== */
        .header {
            background: var(--bg);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
        }

        .header .status-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 6px;
            background: var(--border);
            color: var(--comment);
            position:relative;
            margin-left:14px;
            transition: all .3s;
        }
        .header .status-badge::before {
            content:''; position:absolute; left:-12px; top:50%;
            width:8px; height:8px; border-radius:50%;
            transform:translateY(-50%);
        }
        .header .status-badge.connected {
            background: var(--accent);
            color: var(--bg);
        }
        .header .status-badge.connected::before {
            background:#3fb950;
            animation: blinkGreen 1s ease-in-out infinite;
        }
        .header .status-badge.disconnected {
            background: var(--comment);
            color: var(--bg);
        }
        .header .status-badge.disconnected::before {
            background:#f85149;
            animation:none;
        }
        .header .btn-icon {
            background:transparent; border:1px solid var(--border);
            border-radius:6px; cursor:pointer; font-size:16px;
            padding:4px 8px; line-height:1; transition:all .2s;
        }
        .header .btn-icon:hover { border-color:var(--accent); background:var(--raised); }
        @keyframes blinkGreen {
            0%,100% { opacity:1; }
            50% { opacity:0.2; }
        }

        /* -- 主题选择器 -- */
        .theme-grid { display:flex; flex-wrap:wrap; gap:8px; }
        .theme-option {
            display:flex; flex-direction:column; align-items:center; gap:4px;
            padding:8px 12px; border:2px solid var(--border); border-radius:8px;
            cursor:pointer; transition:all .2s; background:var(--raised);
            min-width:90px;
        }
        .theme-option:hover { border-color:var(--accent); }
        .theme-option.theme-selected { border-color:var(--accent); box-shadow:0 0 8px var(--accent); }
        .theme-swatches { display:flex; gap:2px; }
        .theme-swatches span { width:12px; height:12px; border-radius:50%; display:inline-block; border:1px solid var(--border); }

        /* ===== 主体 ===== */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== 左侧栏 ===== */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--bg);
            border-right: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar h2 {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar .section {
            margin-bottom: 16px;
        }

        .sidebar label {
            display: block;
            font-size: 12px;
            color: var(--comment);
            margin-bottom: 4px;
        }

        .sidebar select,
        .sidebar input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #21262d;
            border-radius: 6px;
            background: #0d1117;
            color: #e6edf3;
            font-size: 13px;
            outline: none;
            transition: border .2s;
        }

        .sidebar select:focus,
        .sidebar input:focus {
            border-color: #58a6ff;
        }

        .sidebar select option {
            background: var(--bg);
        }

        /* 自定义下拉框 */
        .custom-select {
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        .custom-select .select-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            line-height: 1.4;
            transition: border .2s;
        }

        .custom-select .select-trigger:hover {
            border-color: var(--comment);
        }

        .custom-select.open .select-trigger {
            border-color: #58a6ff;
            border-radius: 6px 6px 0 0;
        }

        .custom-select .select-trigger .arrow {
            color: var(--comment);
            font-size: 20px;
            line-height: 1;
            transition: transform .2s;
        }

        .custom-select.open .select-trigger .arrow {
            transform: rotate(180deg);
        }

        .custom-select .select-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--raised);
            border: 1px solid var(--accent);
            border-top: none;
            border-radius: 0 0 6px 6px;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
        }

        .custom-select.open .select-dropdown {
            display: block;
        }

        .custom-select .select-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            font-size: 13px;
            color: var(--text);
            transition: background .15s;
        }

        .custom-select .select-item:hover {
            background: var(--border);
        }

        .custom-select .select-item.selected {
            color: var(--accent);
        }

        .custom-select .select-item .del-btn {
            background: none;
            border: none;
            color: var(--comment);
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            line-height: 1;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .custom-select .select-item .del-btn:hover {
            color: var(--danger);
            background: var(--border);
        }

        .custom-select .select-item .edit-btn {
            background: none;
            border: none;
            color: var(--comment);
            cursor: pointer;
            font-size: 13px;
            padding: 0 4px;
            line-height: 1;
            border-radius: 6px;
            flex-shrink: 0;
            margin-right: 2px;
        }

        .custom-select .select-item .edit-btn:hover {
            color: var(--accent);
            background: var(--border);
        }

        .custom-select .select-empty {
            padding: 6px 10px;
            font-size: 13px;
            color: var(--comment);
        }

        /* 内联/小型自定义下拉 */
        .custom-select-inline {
            display: inline-flex;
            vertical-align: middle;
        }

        .custom-select-inline .select-trigger {
            padding: 4px 8px;
            font-size: 12px;
            width: auto;
        }

        .custom-select-inline .select-trigger .arrow {
            font-size: 18px;
            line-height: 1;
            margin-left: 4px;
        }

        .custom-select-inline .select-item {
            font-size: 12px;
            padding: 4px 8px;
        }

        .custom-select-inline .select-dropdown {
            min-width: 100%;
            width: auto;
            white-space: nowrap;
        }

        .custom-select-disabled .select-trigger {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .custom-select-disabled .select-trigger:hover {
            border-color: #21262d;
        }

        .sidebar .inline-group {
            display: flex;
            gap: 8px;
        }

        .sidebar .inline-group>* {
            flex: 1;
        }

        .sidebar .checkbox-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sidebar .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .sidebar .checkbox-group input[type="checkbox"] {
            width: auto;
            accent-color: #58a6ff;
        }

        /* ===== 按钮 ===== */
        .btn {
            padding: 4px 16px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            line-height: 1.4;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            width: 100%;
        }

        .btn-primary:hover {
            background: color-mix(in srgb, var(--accent) 80%, white);
        }

        .btn-primary.connected {
            background: var(--border);
            color: var(--text);
            border-color: var(--accent);
        }

        .btn-primary.connected:hover {
            background: color-mix(in srgb, var(--border) 80%, var(--text));
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 13px;
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: color-mix(in srgb, var(--border) 80%, var(--text));
        }

        .btn-secondary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: var(--border);
        }
        .btn-secondary:disabled:hover {
            background: var(--border);
        }

        /* ===== 统计 ===== */
        .counter-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--comment);
            padding: 6px 0;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }

        .counter-row span {
            font-weight: 600;
            color: #e6edf3;
        }

        /* ===== 右侧数据区 ===== */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
            gap: 12px;
        }

        .rx-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .section-header h3 {
            font-size: 13px;
            color: var(--accent);
        }

        .section-header .toolbar {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-end;
        }

        .section-header .toolbar .tb-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* -- 接收框 -- */
        .rx-area {
            flex: 1;
            background: var(--raised);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 0;
            resize: none;
            outline: none;
            color: #e6edf3;
        }

        .rx-area .timestamp {
            color: var(--comment);
            font-size: 11px;
        }

        .rx-area .rx-hex {
            color: var(--text);
        }

        .rx-area .rx-text {
            color: var(--text);
        }

        .rx-area .rx-arrow {
            color: var(--accent);
        }

        /* -- 数据标签面板 -- */
        .rx-data-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 6px;
        }

        .rx-data-panel .dp-item {
            display: flex;
            align-items: center;
            gap: 2px;
            box-sizing: border-box;
            width: calc((100% - 24px) / 5);
            min-width: 120px;
            flex-shrink: 0;
            background: var(--raised);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px;
            font-size: 12px;
            flex-wrap: nowrap;
            overflow: hidden;
        }

        .rx-data-panel .dp-item .dp-name {
            color: var(--comment);
            white-space: nowrap;
            font-size: 11px;
            padding: 0 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 1;
        }

        .rx-data-panel .dp-item .dp-val {
            width: 30px;
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 11px;
            padding: 1px 2px;
            text-align: center;
            outline: none;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            flex-shrink: 0;
        }

        .rx-data-panel .dp-item .dp-new-inp {
            flex: 1;
            min-width: 30px;
            background: transparent;
            border: none;
            color: #e6edf3;
            font-size: 11px;
            padding: 2px 4px;
            outline: none;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        }

        .rx-data-panel .dp-item .dp-bar-wrap {
            flex: 1;
            min-width: 20px;
            height: 16px;
            background: var(--border);
            border-radius: 6px;
            overflow: hidden;
            margin-right: 4px;
            width: 0;
        }

        .rx-data-panel .dp-item .dp-bar-wrap.dp-bar-hide {
            display: none;
        }

        .rx-data-panel .dp-item .dp-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 6px;
            transition: width .15s;
        }

        .rx-data-panel .dp-item .dp-led {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background .15s;
        }

        .rx-data-panel .dp-item .dp-led.led-on {
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .rx-data-panel .dp-item .dp-led.led-off {
            background: var(--danger);
            box-shadow: 0 0 6px var(--danger);
        }

        /* -- 曲线点图面板 -- */
        .rx-chart-panel {
            width:0; min-width:0; overflow-y:auto; overflow-x:hidden;
            display:flex; flex-wrap:wrap; align-content:flex-start;
            gap:4px; transition:min-width .2s, width .2s;
        }
        .rx-chart-panel.visible {
            min-width:400px; width:33.33%;
        }
        .rx-chart-item {
            background:var(--raised); border:1px solid var(--border);
            border-radius:6px; position:relative;
            display:flex; flex-direction:column;
        }
        .rx-chart-item .chart-titlebar {
            display:flex; align-items:center; gap:4px;
            height:30px; flex-shrink:0; padding:0 6px;
            position:relative; z-index:2;
        }
        .rx-chart-item canvas {
            width:100%; flex:1; display:block; min-height:0;
        }
        /* 自适应平铺：根据图表数量 */
        .cc-1 .rx-chart-item { width:100%; height:100%; }
        .cc-2 .rx-chart-item { width:100%; height:calc(50% - 2px); }
        .cc-3 .rx-chart-item { width:100%; height:calc(33.33% - 3px); }
        .cc-4 .rx-chart-item { width:calc(50% - 2px); height:calc(50% - 2px); }
        .cc-5 .rx-chart-item,
        .cc-6 .rx-chart-item { width:calc(50% - 2px); height:calc(33.33% - 3px); }
        .rx-chart-item .chart-name {
            font-size:11px; color:var(--comment);
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            flex-shrink:0;
        }
        .rx-chart-item .chart-maxpts-label {
            font-size:10px; color:var(--comment); white-space:nowrap;
            flex-shrink:1; min-width:0; overflow:hidden; text-overflow:ellipsis;
        }
        .rx-chart-item .chart-titlebar-spacer {
            flex:1; min-width:4px;
        }
        .rx-chart-item .chart-del {
            border:none; border-radius:6px; cursor:pointer;
            font-size:11px; padding:4px 6px; min-width:28px;
            background:var(--danger); color:#fff; line-height:1.4;
            text-align:center; transition:opacity .15s;
            flex-shrink:0;
        }
        .rx-chart-item .chart-del:hover { opacity:0.8; }
        .rx-chart-item .chart-drag-handle {
            cursor:grab; color:var(--comment); font-size:12px;
            line-height:1; padding:0 2px; user-select:none;
            flex-shrink:0;
        }
        .rx-chart-item .chart-drag-handle:active { cursor:grabbing; }
        .rx-chart-item.drag-over,
        .dp-item.drag-over,
        .qs-item.drag-over { border-color:var(--accent) !important; box-shadow:0 0 8px rgba(88,166,255,.3) !important; }
        .dp-drag, .qs-drag {
            cursor:grab; color:var(--comment); font-size:11px;
            line-height:1; padding:0 2px; user-select:none; flex-shrink:0;
        }
        .dp-drag:active, .qs-drag:active { cursor:grabbing; }
        @keyframes flashGreen {
            0% { box-shadow: inset 0 0 0 1px #3fb950; background:rgba(63,185,80,0.15); }
            100% { box-shadow: none; background:transparent; }
        }
        .qs-item input.flash-empty {
            animation: flashGreen .6s ease-out;
        }

        /* ===== 模态弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 20px;
            width: 400px;
            box-sizing: border-box;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        .modal-title {
            font-size: 14px;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 12px;
        }

        .modal-body {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .modal-body input,
        .modal-body select {
            width: 100%;
            padding: 6px 10px;
            margin-top: 8px;
            border: 1px solid #21262d;
            border-radius: 6px;
            background: #0d1117;
            color: #e6edf3;
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
        }

        .modal-body input:focus,
        .modal-body select:focus {
            border-color: #58a6ff;
        }

        .modal-body select option {
            background: #0d1117;
        }

        /* Serial port picker */
        .port-picker-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 320px;
            overflow-y: auto;
        }
        .port-picker-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 10px 14px;
            border: 1px solid #21262d;
            border-radius: 6px;
            cursor: pointer;
            transition: all .15s;
            background: #0d1117;
        }
        .port-picker-item:hover {
            border-color: #58a6ff;
            background: #161b22;
        }
        .port-picker-item.selected {
            border-color: #58a6ff;
            background: #1c2333;
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
        }
        .port-picker-item .ppi-name {
            font-size: 14px;
            font-weight: 500;
            color: #e6edf3;
        }
        .port-picker-item .ppi-info {
            font-size: 12px;
            color: #8b949e;
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* -- 发送区 -- */
        .tx-section {
            flex-shrink: 0;
        }

        .tx-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .tx-row textarea {
            flex: 1;
            background: var(--raised);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            color: var(--text);
            resize: none;
            outline: none;
            min-height: 60px;
            max-height: 120px;
        }

        .tx-row textarea:focus {
            border-color: var(--accent);
        }

        .tx-options {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .tx-options label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .tx-options input[type="checkbox"] {
            accent-color: var(--accent);
        }

        .tx-options select {
            padding: 6px 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            outline: none;
        }

        .tx-right {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tx-right .btn {
            min-width: 70px;
        }

        /* -- 快捷发送 -- */
        .quick-send-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 6px;
            max-height: 160px;
            overflow-y: auto;
        }

        .quick-send-grid .qs-item {
            display: flex;
            align-items: center;
            gap: 2px;
            box-sizing: border-box;
            width: calc((100% - 24px) / 5);
            min-width: 120px;
            flex-shrink: 0;
            background: var(--raised);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px;
            overflow: hidden;
        }

        .quick-send-grid .qs-item input {
            flex: 1;
            min-width: 30px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 11px;
            padding: 2px 4px;
            outline: none;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            width: 0;
        }

        .quick-send-grid .qs-item input:focus {
            color: var(--accent);
        }

        /* 小型操作按钮统一样式：发蓝 ✓绿 ✕红 */
        .qs-send,
        .qs-del,
        .dp-ok,
        .dp-del {
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;

            min-width: 28px;

        .qs-send:hover,
        .qs-del:hover,
        .dp-ok:hover,
        .dp-del:hover {
            opacity: 0.8;
        }

            margin-left: auto;

        .qs-send {
            background: #58a6ff;
            color: #0d1117;
        }

        .dp-ok {
            background: #3fb950;
            color: #0d1117;
        }

        .qs-del,
        .dp-del {
            background: #f85149;
            color: #fff;
        }

        .quick-send-grid .qs-item .qs-del {
            background: #f85149;
            color: #fff;
        }

        /* 自定义下拉按钮 */
        .custom-select .select-item .edit-btn,
        .custom-select .select-item .del-btn {
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            padding: 4px 6px;
            line-height: 1.4;
            flex-shrink: 0;
            min-width: 28px;
            text-align: center;
        }

        .custom-select .select-item .edit-btn {
            background: #58a6ff;
            color: #0d1117;
        }

        .custom-select .select-item .del-btn {
            background: #f85149;
            color: #fff;
        }

        .custom-select .select-item .edit-btn:hover,
        .custom-select .select-item .del-btn:hover {
            opacity: 0.8;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #21262d;
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #30363d;
        }

        /* ===== 响应式 ===== */
        @media (max-width:768px) {
            .sidebar {
                width: 240px;
                min-width: 240px;
            }
        }

        @media (max-width:600px) {
            .main {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid #21262d;
                max-height: 260px;

    </style>
</head>

<body>

    <!-- 顶部标题栏 -->

    <!-- 主体 -->

    <!-- ===== 自定义模态弹窗 ===== -->

    <script>
        // ============================================================
        //  状态
        // ============================================================
        let port = null;
        let reader = null;
        let connected = false;
        let portList = [];      // 已授权串口列表
        let rxCounter = 0;
        let txCounter = 0;
        let autoSendTimer = null;
        let keepReading = false;
        let rxLineBuffer = '';   // 行缓冲：攒够一行再显示

        const els = {
            portSelect: document.getElementById('portSelect'),
            portTrigger: document.getElementById('portTrigger'),
            portPlaceholder: document.getElementById('portPlaceholder'),
            portDropdown: document.getElementById('portDropdown'),
            btnRequest: document.getElementById('btnRequest'),
            baudRate: document.getElementById('baudRate'),
            dataBits: document.getElementById('dataBits'),
            stopBits: document.getElementById('stopBits'),
            parity: document.getElementById('parity'),
            flowRts: document.getElementById('flowRts'),
            flowDtr: document.getElementById('flowDtr'),
            btnConnect: document.getElementById('btnConnect'),
            statusBadge: document.getElementById('statusBadge'),
            rxCount: document.getElementById('rxCount'),
            txCount: document.getElementById('txCount'),
            rxArea: document.getElementById('rxArea'),
            txInput: document.getElementById('txInput'),
            btnSend: document.getElementById('btnSend'),
            btnClearRx: document.getElementById('btnClearRx'),
            btnClearTx: document.getElementById('btnClearTx'),
            btnSaveRx: document.getElementById('btnSaveRx'),
            btnAddLabel: document.getElementById('btnAddLabel'),
            btnAddBar: document.getElementById('btnAddBar'),
            btnAddLed: document.getElementById('btnAddLed'),
            btnAddChart: document.getElementById('btnAddChart'),

            rxChartPanel: document.getElementById('rxChartPanel'),
            rxDataPanel: document.getElementById('rxDataPanel'),
            rxDisplayMode: document.getElementById('rxDisplayMode'),
            rxTimestamp: document.getElementById('rxTimestamp'),
            rxAutoScroll: document.getElementById('rxAutoScroll'),
            rxMaxLines: document.getElementById('rxMaxLines'),
            txHexMode: document.getElementById('txHexMode'),
            txAppendNewline: document.getElementById('txAppendNewline'),
            txAutoSend: document.getElementById('txAutoSend'),
            txAutoInterval: document.getElementById('txAutoInterval'),
            btnAddQuick: document.getElementById('btnAddQuick'),
            quickSendGrid: document.getElementById('quickSendGrid'),
            btnTheme: document.getElementById('btnTheme'),
            btnLang: document.getElementById('btnLang'),
        };

        // ============================================================
        //  工具函数
        // ============================================================
        function getTimestamp() {
            const d = new Date();
            const h = String(d.getHours()).padStart(2, '0');
            const m = String(d.getMinutes()).padStart(2, '0');
            const s = String(d.getSeconds()).padStart(2, '0');
            const ms = String(d.getMilliseconds()).padStart(3, '0');
            return `${h}:${m}:${s}.${ms}`;
        }

        function arrayBufferToHex(buf) {
            const bytes = new Uint8Array(buf);
            return Array.from(bytes).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
        }

        function arrayBufferToText(buf) {
            const bytes = new Uint8Array(buf);
            // 尝试用 TextDecoder 解码，替换非法字符
            const decoder = new TextDecoder('utf-8', { fatal: false });
            return decoder.decode(buf);
        }

        function getDeviceName(vid, pid) {
            if (vid && pid) {
                return `(${vid.toString(16).toUpperCase()},${pid.toString(16).toUpperCase()})`;
            }
            return '(未知)';
        }

        function hexStringToBytes(hex) {
            // 移除空格、0x 前缀等
            const clean = hex.replace(/0x/gi, '').replace(/\s+/g, '');
            if (clean.length === 0) return null;
            if (clean.length % 2 !== 0) return null;
            const bytes = [];
            for (let i = 0; i < clean.length; i += 2) {
                const byte = parseInt(clean.substring(i, i + 2), 16);
                if (isNaN(byte)) return null;
                bytes.push(byte);
            }
            return new Uint8Array(bytes);
        }

        // ============================================================
        //  显示格式转换
        // ============================================================
        function formatBinary(buf) {
            const bytes = new Uint8Array(buf);
            return Array.from(bytes).map(b =>
                b.toString(2).padStart(8, '0')
            ).join(' ');
        }

        function formatOctal(buf) {
            const bytes = new Uint8Array(buf);
            return Array.from(bytes).map(b =>
                '0' + b.toString(8).padStart(3, '0')
            ).join(' ');
        }

        function formatDecimal(buf) {
            const bytes = new Uint8Array(buf);
            return Array.from(bytes).map(b =>
                String(b).padStart(3, ' ')
            ).join(' ');
        }

        function formatHexAscii(buf) {
            const bytes = new Uint8Array(buf);
            const hexPart = Array.from(bytes).map(b =>
                b.toString(16).padStart(2, '0').toUpperCase()
            ).join(' ');

            const asciiPart = Array.from(bytes).map(b =>
                b >= 0x20 && b <= 0x7E ? String.fromCharCode(b) : '.'
            ).join('');

            // 每行最多显示16字节，分组排版
            const bytesPerLine = 16;
            const lines = [];
            for (let i = 0; i < bytes.length; i += bytesPerLine) {
                const chunk = bytes.slice(i, i + bytesPerLine);
                const hexChunk = Array.from(chunk).map(b =>
                    b.toString(16).padStart(2, '0').toUpperCase()
                ).join(' ');
                const asciiChunk = Array.from(chunk).map(b =>
                    b >= 0x20 && b <= 0x7E ? String.fromCharCode(b) : '.'
                ).join('');
                // 补齐 HEX 部分使 ASCII 对齐
                const paddedHex = hexChunk.padEnd(bytesPerLine * 3 - 1, ' ');
                lines.push(`${paddedHex}  ${asciiChunk}`);
            }
            return lines.join('\n');
        }

        function formatData(buf, mode) {
            switch (mode) {
                case 'hex': return arrayBufferToHex(buf);
                case 'binary': return formatBinary(buf);
                case 'octal': return formatOctal(buf);
                case 'decimal': return formatDecimal(buf);
                case 'hexascii': return formatHexAscii(buf);
                case 'text':
                default: return arrayBufferToText(buf);
            }
        }

        function appendRx(data) {
            const el = els.rxArea;
            const mode = els.rxDisplayMode.value;
            const showTs = els.rxTimestamp.checked;
            const cssClass = mode === 'hex' || mode === 'hexascii' ? 'rx-hex' : 'rx-text';

            // 文本模式：行缓存，攒够 \n 结尾的完整行才显示，确保一行只有一个时间戳
            if (mode === 'text') {
                const text = arrayBufferToText(data);
                rxLineBuffer += text;

                const lines = rxLineBuffer.split('\n');
                rxLineBuffer = lines.pop() || '';  // 最后一个可能是未完成行，留到下次

                for (const line of lines) {
                    if (line.trim() === '') continue; // 跳过空白行（空行、\r、\n 等）
                    const escaped = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    let html = '';
                    if (showTs) {
                        html += `<span class="timestamp">[${getTimestamp()}]</span> `;
                    }
                    html += `<span class="${cssClass}">${escaped}</span>`;
                    el.insertAdjacentHTML('beforeend', `<div class="rx-line">${html}</div>`);
                    // 文本模式：每收到一行完整数据就刷新图表
                    onNewDataLine(line);
                }
            } else {
                // 非文本模式：直接显示，每块数据一个时间戳
                const text = formatData(data, mode);
                const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                let html = '';
                if (showTs) {
                    html += `<span class="timestamp">[${getTimestamp()}]</span> `;
                }
                html += `<span class="${cssClass}">${escaped}</span>`;
                el.insertAdjacentHTML('beforeend', `<div class="rx-line">${html}</div>`);
            }

            trimRx();

            if (els.rxAutoScroll.checked) {
                el.scrollTop = el.scrollHeight;
            }

            rxCounter += data.byteLength;
            els.rxCount.textContent = rxCounter;
        }

        function trimRx() {
            const max = parseInt(els.rxMaxLines.value);
            if (max <= 0) return;
            const el = els.rxArea;
            while (el.children.length > max) {
                el.removeChild(el.firstChild);
            }
        }

        // ============================================================
        //  数据标签 & 进度条
        // ============================================================
        let dataLabels = [];
        let dataLabelTimer = null;
        let chartItems = [];
        const MAX_CHARTS = 6;
        const CHART_MAX_POINTS_OPTIONS = [10,20,50,100,200,500,1000];

        function addLabelEditor(mode) {
            const placeholder = t('prefixPlaceholder');
            els.rxDataPanel.classList.add('visible');
            const el = document.createElement('div');
            el.className = 'dp-item dp-editing';
            el.innerHTML = '<input class="dp-new-inp" type="text" placeholder="' + placeholder + '" spellcheck="false">'
                + '<button class="dp-ok">\u2713</button>'
                + '<button class="dp-del">\uD83D\uDDD1</button>';
            el.querySelector('.dp-ok').addEventListener('click', async () => {
                const inp = el.querySelector('.dp-new-inp');
                const prefix = inp.value.trim();
                if (prefix.length < 2) { modalAlert(t('prefixTooShort')); return; }
                if (dataLabels.some(d => d.prefix === prefix)) {
                    modalAlert(t('alreadyExists'));
                    return;
                }
                // 提取初值，跟踪范围
                const text = els.rxArea.textContent;
                const lines = text.split('\n');
                let val = 0, vmin = 0, vmax = 0;
                const extractFn = mode === 'led' ? extractLedVal : extractVal;
                for (let i = lines.length - 1; i >= 0; i--) {
                    const v = extractFn(lines[i], prefix);
                    if (v !== null) {
                        val = v;
                        vmin = Math.min(vmin, val);
                        vmax = Math.max(vmax, val);
                        break;
                    }
                }
                const idx = dataLabels.length;
                if (mode === 'led') {
                    // LED 配置弹窗
                    // 内联绑定切换 —— 先设置好切换逻辑再显示弹窗
                    const cfg = await (() => {
                        // 用同步方式设置 modal 内容，然后返回 promise
                        modal.title.textContent = t('ledConfig');
                        modal.body.innerHTML = '<div style="margin-bottom:8px;">'
                            + '<label style="display:block;margin-bottom:4px;color:#8b949e;">' + t('mode') + '</label>'
                            + '<select id="modalLedMode" style="margin-bottom:8px;">'
                            + '<option value="bool">' + t('ledModeBool') + '</option>'
                            + '<option value="threshold">' + t('ledModeThreshold') + '</option>'
                            + '</select>'
                            + '<input id="modalLedThreshold" type="text" placeholder="' + t('thresholdPlaceholder') + '" disabled>'
                            + '</div>';
                        modal.footer.innerHTML = '';
                        const cancelBtn = document.createElement('button');
                        cancelBtn.className = 'btn btn-secondary btn-sm';
                        cancelBtn.textContent = t('cancel');
                        cancelBtn.style.minWidth = '70px';
                        modal.footer.appendChild(cancelBtn);
                        const confirmBtn = document.createElement('button');
                        confirmBtn.className = 'btn btn-primary btn-sm';
                        confirmBtn.textContent = t('confirm');
                        confirmBtn.style.minWidth = '70px';
                        modal.footer.appendChild(confirmBtn);
                        modal.box.style.width = '380px';
                        // 绑定模式切换逻辑
                        const sel = modal.body.querySelector('#modalLedMode');
                        const inp = modal.body.querySelector('#modalLedThreshold');
                        const toggleTh = () => {
                            const isTh = sel.value === 'threshold';
                            inp.style.display = isTh ? '' : 'none';
                            if (isTh) inp.focus();
                        };
                        sel.onchange = toggleTh;
                        toggleTh(); // 默认布尔模式隐藏阈值输入
                        // 弹窗 Promise
                        return new Promise((resolve) => {
                            modal.overlay.classList.add('open');
                            const firstInput = modal.body.querySelector('input,select');
                            if (firstInput) setTimeout(() => firstInput.focus(), 50);
                            const cleanup = () => {
                                cancelBtn.removeEventListener('click', onCancel);
                                confirmBtn.removeEventListener('click', onConfirm);
                                document.removeEventListener('keydown', onKey);
                                modal.overlay.removeEventListener('click', onOverlay);
                            };
                            const onCancel = () => { cleanup(); closeModal(); resolve(null); };
                            const onConfirm = () => {
                                const m = sel.value;
                                if (m === 'threshold') {
                                    const t = parseFloat(inp.value);
                                    if (isNaN(t)) { inp.focus(); return; }
                                    cleanup(); closeModal(); resolve({ ledMode: 'threshold', threshold: t });
                                } else {
                                    cleanup(); closeModal(); resolve({ ledMode: 'bool', threshold: 0 });
                                }
                            };
                            const onKey = (e) => {
                                if (e.key === 'Enter') onConfirm();
                                if (e.key === 'Escape') onCancel();
                            };
                            const onOverlay = (e) => { if (e.target === modal.overlay) onCancel(); };
                            cancelBtn.addEventListener('click', onCancel);
                            confirmBtn.addEventListener('click', onConfirm);
                            document.addEventListener('keydown', onKey);
                            modal.overlay.addEventListener('click', onOverlay);
                        });
                    })();
                    if (!cfg) { el.remove(); return; }
                    dataLabels.push({ prefix, value: val, min: vmin, max: vmax, mode, ledMode: cfg.ledMode, threshold: cfg.threshold });
                } else {
                    dataLabels.push({ prefix, value: val, min: vmin, max: vmax, mode });
                }
                // 切换为只读
                el.classList.remove('dp-editing');
                buildLabelElement(el, dataLabels[idx], idx);
                // 新创建的标签也加上拖拽（仅手柄）
                const handle = el.querySelector('.dp-drag');
                const panel = els.rxDataPanel;
                handle.addEventListener('dragstart', (e) => {
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', idx);
                    el.style.opacity = '0.4';
                });
                handle.addEventListener('dragend', () => {
                    el.style.opacity = '';
                    panel.querySelectorAll('.dp-item.drag-over').forEach(el => el.classList.remove('drag-over'));
                });
                el.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; el.classList.add('drag-over'); });
                el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
                el.addEventListener('drop', (e) => {
                    e.preventDefault(); el.classList.remove('drag-over');
                    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                    const toIdx = idx;
                    if (fromIdx !== toIdx) {
                        const [moved] = dataLabels.splice(fromIdx, 1);
                        dataLabels.splice(toIdx, 0, moved);
                        saveSettings();
                        renderDataPanel();
                    }
                });
                startLabelTimer();
                saveSettings();
            });
            el.querySelector('.dp-del').addEventListener('click', () => {
                el.remove();
                if (!els.rxDataPanel.hasChildNodes()) els.rxDataPanel.classList.remove('visible');
            });
            els.rxDataPanel.appendChild(el);
            el.querySelector('.dp-new-inp').focus();
        }

        function buildLabelElement(el, item, idx) {
            const h = escapeHtml(item.prefix);
            const isBar = item.mode === 'progress';
            const isLed = item.mode === 'led';
            el.className = 'dp-item';
            el.dataset.idx = idx;
            if (isLed) {
                const on = getLedState(item.value, item);
                el.innerHTML = '<span class="dp-drag" draggable="true">\u283F</span>'
                    + '<span class="dp-name">' + h + ':</span>'
                    + '<span class="dp-led led-' + (on ? 'on' : 'off') + '"></span>'
                    + '<input class="dp-val" type="text" value="' + item.value + '" readonly spellcheck="false">'
                    + '<div class="dp-bar-wrap dp-bar-hide"><div class="dp-bar-fill"></div></div>'
                    + '<button class="dp-del">\uD83D\uDDD1</button>';
            } else {
                el.innerHTML = '<span class="dp-drag" draggable="true">\u283F</span>'
                    + '<span class="dp-name">' + h + ':</span>'
                    + '<input class="dp-val" type="text" value="' + item.value + '" readonly spellcheck="false">'
                    + '<div class="dp-bar-wrap' + (isBar ? '' : ' dp-bar-hide') + '"><div class="dp-bar-fill" style="width:0%"></div></div>'
                    + '<button class="dp-del">\uD83D\uDDD1</button>';
            }
            el.querySelector('.dp-del').addEventListener('click', () => removeDataLabel(idx));
            updateBar(el, item);
        }

        function getLedState(val, item) {
            if (item.ledMode === 'bool') return val !== 0;
            return val > item.threshold;
        }

        function renderDataPanel() {
            const panel = els.rxDataPanel;
            const editors = panel.querySelectorAll('.dp-editing');
            panel.innerHTML = '';
            editors.forEach(el => panel.appendChild(el));
            if (dataLabels.length === 0 && editors.length === 0) {
                panel.classList.remove('visible');
                return;
            }
            panel.classList.add('visible');
            for (let i = 0; i < dataLabels.length; i++) {
                const el = document.createElement('div');
                buildLabelElement(el, dataLabels[i], i);
                // 拖拽排序（仅手柄可拖）
                const handle = el.querySelector('.dp-drag');
                handle.addEventListener('dragstart', (e) => {
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', i);
                    el.style.opacity = '0.4';
                });
                handle.addEventListener('dragend', () => {
                    el.style.opacity = '';
                    panel.querySelectorAll('.dp-item.drag-over').forEach(el => el.classList.remove('drag-over'));
                });
                el.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    el.classList.add('drag-over');
                });
                el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
                el.addEventListener('drop', (e) => {
                    e.preventDefault();
                    el.classList.remove('drag-over');
                    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                    const toIdx = i;
                    if (fromIdx !== toIdx) {
                        const [moved] = dataLabels.splice(fromIdx, 1);
                        dataLabels.splice(toIdx, 0, moved);
                        saveSettings();
                        renderDataPanel();
                    }
                });
                panel.appendChild(el);
            }
        }

        function removeDataLabel(idx) {
            dataLabels.splice(idx, 1);
            saveSettings();
            if (dataLabels.length === 0) {
                stopLabelTimer();
                renderDataPanel();
            } else {
                renderDataPanel();
            }
        }

        function updateBar(el, item) {
            if (item.mode !== 'progress' || !el) return;
            const fill = el.querySelector('.dp-bar-fill');
            if (!fill) return;
            const range = item.max - item.min || 1;
            let pct = ((item.value - item.min) / range) * 100;
            pct = Math.max(0, Math.min(100, pct));
            fill.style.width = pct + '%';
        }

        function escapeRegex(s) {
            return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 新数据到达时刷新曲线点图
        function onNewDataLine(line) {
            if (chartItems.length === 0) return;
            for (const item of chartItems) {
                if (!item.canvas) continue;
                const v = extractVal(line, item.prefix);
                if (v !== null) {
                    item.values.push(v);
                    if (item.values.length > (item.maxPoints || 50)) item.values.shift();
                    drawChart(item);
                }
            }
        }

        // 在行中查找前缀，提取行内最后一个数字
        function extractVal(line, prefix) {
            if (!line.includes(prefix)) return null;
            const nums = line.match(/-?\d+\.?\d*/g);
            if (!nums || nums.length === 0) return null;
            return parseFloat(nums[nums.length - 1]);
        }

        // LED 专用：提取数值，并识别 true/false 文本
        function extractLedVal(line, prefix) {
            if (!line.includes(prefix)) return null;
            const lower = line.toLowerCase();
            // 识别 true/false 文本
            const after = lower.slice(lower.indexOf(prefix.toLowerCase()) + prefix.length);
            if (/true/.test(after)) return 1;
            if (/false/.test(after)) return 0;
            // 回退到数字提取
            return extractVal(line, prefix);
        }

        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function updateDataPanel() {
            if (dataLabels.length === 0) return;
            const text = els.rxArea.textContent;
            const lines = text.split('\n');
            const lastLines = lines.slice(-50);
            for (let i = 0; i < dataLabels.length; i++) {
                const item = dataLabels[i];
                const fn = item.mode === 'led' ? extractLedVal : extractVal;
                for (let j = lastLines.length - 1; j >= 0; j--) {
                    const v = fn(lastLines[j], item.prefix);
                    if (v !== null) {
                        item.value = v;
                        if (v < item.min) item.min = v;
                        if (v > item.max) item.max = v;
                        break;
                    }
                }
                const dp = els.rxDataPanel.querySelector('.dp-item[data-idx="' + i + '"]');
                if (!dp) continue;
                const inp = dp.querySelector('.dp-val');
                if (inp) inp.value = item.value;
                // LED 颜色更新
                if (item.mode === 'led') {
                    const led = dp.querySelector('.dp-led');
                    if (led) {
                        led.className = 'dp-led led-' + (getLedState(item.value, item) ? 'on' : 'off');
                    }
                }
                updateBar(dp, item);
            }
        }

        function startLabelTimer() {
            if (dataLabelTimer) clearInterval(dataLabelTimer);
            dataLabelTimer = setInterval(updateDataPanel, 200);
        }
        function stopLabelTimer() {
            if (dataLabelTimer) { clearInterval(dataLabelTimer); dataLabelTimer = null; }
        }

        // 从存储恢复
        function addLabelFromStorage(item) {
            const text = els.rxArea.textContent;
            const lines = text.split('\n');
            let val = 0, vmin = 0, vmax = 0;
            for (let i = lines.length - 1; i >= 0; i--) {
                const fn = item.mode === 'led' ? extractLedVal : extractVal;
                const v = fn(lines[i], item.prefix);
                if (v !== null) {
                    val = v;
                    vmin = Math.min(vmin, val);
                    vmax = Math.max(vmax, val);
                    break;
                }
            }
            item.value = val; item.min = vmin; item.max = vmax;
            const idx = dataLabels.length;
            dataLabels.push(item);

            const panel = els.rxDataPanel;
            handle.addEventListener('dragstart', (e) => {
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', idx);
                el.style.opacity = '0.4';
            });
            handle.addEventListener('dragend', () => {
                el.style.opacity = '';
                panel.querySelectorAll('.dp-item.drag-over').forEach(el => el.classList.remove('drag-over'));
            });
            el.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; el.classList.add('drag-over'); });
            el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
            el.addEventListener('drop', (e) => {
                e.preventDefault(); el.classList.remove('drag-over');
                const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                const toIdx = idx;
                if (fromIdx !== toIdx) {
                    const [moved] = dataLabels.splice(fromIdx, 1);
                    dataLabels.splice(toIdx, 0, moved);
                    saveSettings();
                    renderDataPanel();
                }

            els.rxDataPanel.appendChild(el);
            els.rxDataPanel.classList.add('visible');
