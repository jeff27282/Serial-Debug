        function updateCharts() {
            if (chartItems.length === 0) return;
            const text = els.rxArea.textContent;
            const lines = text.split('\n');
            const lastLines = lines.slice(-50);
            for (const item of chartItems) {
                if (!item.canvas) continue;
                for (let j = lastLines.length - 1; j >= 0; j--) {
                    const v = extractVal(lastLines[j], item.prefix);
                    if (v !== null) {
                        item.values.push(v);
                        if (item.values.length > (item.maxPoints || 50)) item.values.shift();
                        drawChart(item);
                        break;
                    }
                }
            }
        }

        function drawChart(item) {
            if (!item.ctx || !item.canvas) return;
            const canvas = item.canvas;
            const ctx = item.ctx;
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            const w = rect.width, h = rect.height;
            // 从主题 CSS 变量读取颜色
            const cBorder = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#21262d';
            const cAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#58a6ff';
            const cComment = getComputedStyle(document.documentElement).getPropertyValue('--comment').trim() || '#8b949e';
            const cBg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0d1117';
            const cText = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#e6edf3';
            const cDanger = getComputedStyle(document.documentElement).getPropertyValue('--danger').trim() || '#f85149';
            // 背景
            ctx.fillStyle = cBg;
            ctx.fillRect(0, 0, w, h);
            const values = item.values;
            if (values.length < 2) {
                ctx.fillStyle = cComment;
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(t('waiting'), w/2, h/2);
                return;
            }
            const pad = 32;
            const plotW = w - pad - 4;
            const plotH = h - pad * 2;
            const min = Math.min(...values);
            const max = Math.max(...values);
            const range = max - min || 1;
            // 网格线
            ctx.strokeStyle = cBorder;
            ctx.lineWidth = 0.5;
            ctx.setLineDash([2, 3]);
            const gridDiv = 9;
            for (let i = 1; i < gridDiv; i++) {
                const x = pad + (plotW / gridDiv) * i;
                ctx.beginPath(); ctx.moveTo(x, pad); ctx.lineTo(x, pad + plotH); ctx.stroke();
                const y = pad + (plotH / gridDiv) * i;
                ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(pad + plotW, y); ctx.stroke();
            }
            ctx.setLineDash([]);
            // 实线边框
            ctx.strokeStyle = cBorder;
            ctx.lineWidth = 0.5;
            ctx.strokeRect(pad, pad, plotW, plotH);
            // Y轴标注
            ctx.fillStyle = cComment;
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            const labelCount = 10;
            for (let i = 0; i < labelCount; i++) {
                const val = min + (range / (labelCount - 1)) * i;
                const y = pad + plotH - (plotH / (labelCount - 1)) * i;
                const label = val % 1 === 0 ? val.toString() : val.toFixed(1);
                ctx.fillText(label, pad - 4, y);
            }
            // 数据线
            ctx.strokeStyle = cAccent;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            for (let i = 0; i < values.length; i++) {
                const x = pad + plotW - (i / (values.length - 1)) * plotW;
                const y = pad + plotH - ((values[i] - min) / range) * plotH;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            // 数据红点
            ctx.fillStyle = cDanger;
            for (let i = 0; i < values.length; i++) {
                const x = pad + plotW - (i / (values.length - 1)) * plotW;
                const y = pad + plotH - ((values[i] - min) / range) * plotH;
                ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        function addChartFromStorage(prefix, maxPoints) {
            if (chartItems.length >= MAX_CHARTS) return;
            chartItems.push({ prefix, values: [], maxPoints: maxPoints || 50 });
        }

        // 自定义 COM 名称存储（localStorage）
        function getPortKey(info) {
            if (info.usbVendorId && info.usbProductId) {
                return `${info.usbVendorId}:${info.usbProductId}`;
            }
            // For non-USB devices, use the port name as key
            if (info.name || info.comName) {
                return `name:${info.name || info.comName}`;
            }
            return null;
        }

        // Enrich info with a display name so getPortKey can create a key for non-USB devices
        function enrichPortInfo(info, displayName) {
            if (!info.name && !info.comName && displayName) {
                return { ...info, name: displayName };
            }
            return info;
        }

        const AUTHORIZED_DEVICES_KEY = 'authorized_devices';
        function loadAuthorizedDevices() {
            try { return JSON.parse(localStorage.getItem(AUTHORIZED_DEVICES_KEY) || '[]'); } catch { return []; }
        }
        function saveAuthorizedDevices(list) {
            localStorage.setItem(AUTHORIZED_DEVICES_KEY, JSON.stringify(list));
        }
        function addAuthorizedDevice(info) {
            const key = getPortKey(info);
            if (!key) return;
            const list = loadAuthorizedDevices();
            if (!list.includes(key)) {
                list.push(key);
                saveAuthorizedDevices(list);
            }
        }
        function removeAuthorizedDevice(info) {
            const key = getPortKey(info);
            if (!key) return;
            const list = loadAuthorizedDevices().filter(k => k !== key);
            saveAuthorizedDevices(list);
        }
        function isAuthorizedDevice(info) {
            const key = getPortKey(info);
            if (!key) return false; // no identifiable info, don't show
            return loadAuthorizedDevices().includes(key);
        }

        function loadPortNames() {
            try { return JSON.parse(localStorage.getItem('serial_port_names') || '{}'); } catch { return {}; }
        }

        function savePortName(key, name) {
            const names = loadPortNames();
            names[key] = name;
            localStorage.setItem('serial_port_names', JSON.stringify(names));
        }

        // 每个设备的参数保存（波特率、数据位、停止位、校验位、流控）
        const DEVICE_PARAMS_KEY = 'device_params';
        function loadDeviceParams() {
            try { return JSON.parse(localStorage.getItem(DEVICE_PARAMS_KEY) || '{}'); } catch { return {}; }
        }
        function saveDeviceParams(deviceKey, params) {
            const all = loadDeviceParams();
            all[deviceKey] = params;
            localStorage.setItem(DEVICE_PARAMS_KEY, JSON.stringify(all));
        }
        function getDeviceParams(deviceKey) {
            return loadDeviceParams()[deviceKey] || null;
        }
        function removeDeviceParams(deviceKey) {
            const all = loadDeviceParams();
            delete all[deviceKey];
            localStorage.setItem(DEVICE_PARAMS_KEY, JSON.stringify(all));
        }
        // 获取当前选中设备的 key.
        function getSelectedDeviceKey() {
            if (selectedPortIdx < 0 || selectedPortIdx >= portList.length) return null;
            const info = portList[selectedPortIdx].getInfo();
            return getPortKey(info) || `_idx_${selectedPortIdx}`;
        }
        // 保存当前控件的参数到当前选中的设备
        function saveCurrentParamsToDevice() {
            const key = getSelectedDeviceKey();
            if (!key) return;
            saveDeviceParams(key, {
                baudRate: els.baudRate.value,
                dataBits: els.dataBits.value,
                stopBits: els.stopBits.value,
                parity: els.parity.value,
                flowRts: els.flowRts.checked,
                flowDtr: els.flowDtr.checked,
            });
        }
        // 将保存的参数应用到控件
        function applyDeviceParams(key) {
            const params = getDeviceParams(key);
            if (!params) return;
            if (params.baudRate) { els.baudRate.value = params.baudRate; syncCustomSelect(els.baudRate); }
            if (params.dataBits) { els.dataBits.value = params.dataBits; syncCustomSelect(els.dataBits); }
            if (params.stopBits) { els.stopBits.value = params.stopBits; syncCustomSelect(els.stopBits); }
            if (params.parity) { els.parity.value = params.parity; syncCustomSelect(els.parity); }
            if (params.flowRts !== undefined) els.flowRts.checked = params.flowRts;
            if (params.flowDtr !== undefined) els.flowDtr.checked = params.flowDtr;
        }
        // 同步自定义下拉框的显示文本
        function syncCustomSelect(selectEl) {
            const container = selectEl._customContainer;
            if (!container) return;
            const textSpan = container.querySelector('.select-trigger span');
            if (textSpan) textSpan.textContent = selectEl.options[selectEl.selectedIndex]?.text || selectEl.value;
            container.querySelectorAll('.select-item').forEach(el => {
                el.classList.toggle('selected', el.dataset.value === selectEl.value);
            });
        }

        function getPortDisplayName(info, index) {
            const key = getPortKey(info);
            if (key) {
                const names = loadPortNames();
                if (names[key]) return { name: names[key], custom: true };
            }
            const realName = info.name || info.comName || null;
            return { name: realName || `COM${index + 1}`, custom: false };
        }

        async function refreshPorts() {
            try {
                let allPorts = await navigator.serial.getPorts();
                // Only show authorized devices in the dropdown
                portList = allPorts.filter(p => {
                    const info = p.getInfo();
                    // Check with raw info first, then enrich with fallback name for non-USB devices
                    if (isAuthorizedDevice(info)) return true;
                    const idx = allPorts.indexOf(p);
                    const fallbackName = info.name || info.comName || `COM${idx + 1}`;
                    return isAuthorizedDevice(enrichPortInfo(info, fallbackName));
                });
                renderDropdown();
            } catch (e) {
                console.warn('获取串口列表失败:', e);
            }
        }

        function renderDropdown() {
            const dd = els.portDropdown;
            dd.innerHTML = '';
            if (portList.length === 0) {
                dd.innerHTML = '<div class="select-empty">' + t('noAuthorizedPort') + '</div>';
            }
            for (let i = 0; i < portList.length; i++) {
                const p = portList[i];
                const info = p.getInfo();
                const { name: comName, custom } = getPortDisplayName(info, i);
                const label = custom ? comName : `${comName} - ${getDeviceName(info.usbVendorId, info.usbProductId)}`;
                const item = document.createElement('div');
                item.className = 'select-item';
                item.dataset.index = i;
                item.innerHTML = '<span>' + label + '</span><span style="display:flex;">'
                    + '<button class="edit-btn" data-idx="' + i + '" title="重命名">\u270E</button>'
                    + '<button class="del-btn" data-idx="' + i + '" title="删除">\uD83D\uDDD1</button></span>';
                // 点击条目选择串口
                item.addEventListener('click', (e) => {
                    if (e.target.closest('button')) return;
                    selectPort(i);
                });
                // 点击 ✕ 删除
                item.querySelector('.del-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const btn = e.currentTarget;
                    const idx = parseInt(btn.dataset.idx);
                    if (isNaN(idx) || idx >= portList.length) return;
                    try {
                        const info = portList[idx].getInfo();
                        const removedPort = portList[idx];
                        // Get the correct index from allPorts for consistent key generation
                        let allPorts = await navigator.serial.getPorts();
                        const realIdx = allPorts.indexOf(removedPort);
                        const fallbackName = info.name || info.comName || `COM${realIdx + 1}`;
                        const enriched = enrichPortInfo(info, fallbackName);
                        // Remove from local list
                        portList.splice(idx, 1);
                        if (selectedPortIdx === idx) selectedPortIdx = -1;
                        else if (selectedPortIdx > idx) selectedPortIdx--;
                        renderDropdown();
                        // Cleanup
                        try { await removedPort.forget(); } catch { }
                        removeAuthorizedDevice(enriched);
                    } catch (err) {
                        console.error('删除串口失败:', err);
                    }
                });
                // 点击 ✎ 重命名
                item.querySelector('.edit-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const key = getPortKey(info);
                    const { name: cur } = getPortDisplayName(info, i);
                    const name = await showModal({
                        title: t('renamePort'),
                        html: '<input id="modalRenameInput" type="text" value="' + escapeHtml(cur) + '">',
                        getValue: () => document.getElementById('modalRenameInput').value.trim(),
                    });
                    if (name) {
                        if (key) { savePortName(key, name); }
                        else { savePortName('_idx_' + i, name); }
                        renderDropdown();
                    }
                });
                dd.appendChild(item);
            }
            // 恢复选中状态
            if (selectedPortIdx >= 0 && selectedPortIdx < portList.length) {
                highlightSelected(selectedPortIdx);
            } else {
                selectedPortIdx = -1;
                els.portPlaceholder.textContent = t('placeholder');
            }
        }

        let selectedPortIdx = -1;

        function selectPort(idx) {
            // 先保存当前设备的参数
            saveCurrentParamsToDevice();
            selectedPortIdx = idx;
            highlightSelected(idx);
            closeAllDropdowns();
            // 恢复该设备保存的参数
            const info = portList[idx].getInfo();
            const key = getPortKey(info) || `_idx_${idx}`;
            applyDeviceParams(key);
            // 选中后直接尝试连接（如果未连接）
            if (!connected) setTimeout(() => connect(), 50);
        }

        function highlightSelected(idx) {
            const items = els.portDropdown.querySelectorAll('.select-item');
            items.forEach(el => el.classList.remove('selected'));
            const target = els.portDropdown.querySelector(`.select-item[data-index="${idx}"]`);
            if (target) {
                target.classList.add('selected');
                els.portPlaceholder.textContent = target.querySelector('span').textContent;
            }
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.custom-select.open').forEach(el => el.classList.remove('open'));
        }

        // 点击触发器打开/关闭下拉
        els.portTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = els.portSelect.classList.contains('open');
            closeAllDropdowns();
            if (!isOpen) els.portSelect.classList.add('open');
        });

        // 点击外部关闭所有下拉
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-select')) {
                closeAllDropdowns();
            }
        });

        // ============================================================
        //  统一自定义下拉框转换
        // ============================================================
        function convertSelectToCustom(selectEl, isInline) {
            if (!selectEl || selectEl.dataset._converted) return;
            selectEl.dataset._converted = '1';
            const container = document.createElement('div');
            container.className = 'custom-select' + (isInline ? ' custom-select-inline' : '');
            const trigger = document.createElement('div');
            trigger.className = 'select-trigger';
            const textSpan = document.createElement('span');
            textSpan.textContent = selectEl.options[selectEl.selectedIndex]?.text || selectEl.value;
            const arrow = document.createElement('span');
            arrow.className = 'arrow'; arrow.textContent = '\u25BE';
            trigger.appendChild(textSpan); trigger.appendChild(arrow);
            const dropdown = document.createElement('div');
            dropdown.className = 'select-dropdown';
            for (const opt of selectEl.options) {
                const item = document.createElement('div');
                item.className = 'select-item' + (opt.selected ? ' selected' : '');
                item.dataset.value = opt.value;
                item.textContent = opt.text;
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectEl.value = opt.value;
                    container.querySelectorAll('.select-item').forEach(el => el.classList.remove('selected'));
                    item.classList.add('selected');
                    textSpan.textContent = opt.text;
                    closeAllDropdowns();
                    selectEl.dispatchEvent(new Event('change', { bubbles: true }));
                });
                dropdown.appendChild(item);
            }
            container.appendChild(trigger); container.appendChild(dropdown);
            trigger.addEventListener('click', (e) => {
                if (container.classList.contains('custom-select-disabled')) return;
                e.stopPropagation();
                const isOpen = container.classList.contains('open');
                closeAllDropdowns();
                if (!isOpen) container.classList.add('open');
            });
            selectEl.style.display = 'none';
            // 如果 select 在 label 内，将自定义下拉移到 label 外面，避免浏览器 label 行为拦截点击
            const parent = selectEl.parentNode;
            if (parent.tagName === 'LABEL') {
                parent.after(container);
            } else {
                parent.insertBefore(container, selectEl.nextSibling);
            }
            // 同步禁用状态（保存 observer 引用防止被 GC）
            const syncDisabled = () => container.classList.toggle('custom-select-disabled', selectEl.disabled);
            syncDisabled();
            const obs = new MutationObserver(() => syncDisabled());
            obs.observe(selectEl, { attributes: true, attributeFilter: ['disabled'] });
            container._disabledObserver = obs;
            // 保存容器引用到 select 元素上，方便 updateUI 直接查找
            selectEl._customContainer = container;
            return container;
        }

        async function requestPort() {
            try {
                if (window.electronAPI?.isElectron) {
                    // Electron: custom internal port picker modal
                    const p = await new Promise((resolve, reject) => {
                        window.electronAPI.onSerialPorts(async (ports) => {
                            if (!ports || ports.length === 0) {
                                modalAlert(t('noAuthorizedPort'));
                                window.electronAPI.selectSerialPort('');
                                reject(new DOMException('', 'NotFoundError'));
                                return;
                            }
                            const selected = await showSerialPortPicker(ports);
                            if (selected) {
                                window.electronAPI.selectSerialPort(selected.portId);
                                // requestPort() will resolve once main process calls callback
                            } else {
                                window.electronAPI.selectSerialPort('');
                                reject(new DOMException('', 'NotFoundError'));
                            }
                        });
                        // This triggers select-serial-port event in main process
                        navigator.serial.requestPort().then(resolve).catch(reject);
                    });
                    const info = p.getInfo();
                    // Find correct index from full getPorts() list for consistent key
                    const allPorts = await navigator.serial.getPorts();
                    const realIdx = allPorts.indexOf(p);
                    const displayName = info.name || info.comName || `COM${realIdx + 1}`;
                    addAuthorizedDevice(enrichPortInfo(info, displayName));
                    window.electronAPI.saveAuthorizedPort({
                        vendorId: info.usbVendorId,
                        productId: info.usbProductId,
                    });
                    await refreshPorts();
                    const idx = portList.indexOf(p);
                    if (idx >= 0) selectPort(idx);
                } else {
                    // Browser: use native browser chooser dialog
                    const p = await navigator.serial.requestPort();
                    const info = p.getInfo();
                    // Enrich with display name for non-USB devices
                    const allPorts = await navigator.serial.getPorts();
                    const realIdx = allPorts.indexOf(p);
                    const displayName = info.name || info.comName || `COM${realIdx + 1}`;
                    addAuthorizedDevice(enrichPortInfo(info, displayName));
                    await refreshPorts();
                    const idx = portList.indexOf(p);
                    if (idx >= 0) selectPort(idx);
                }
            } catch (e) {
                if (e.name !== 'NotFoundError') {
                    console.error('请求串口失败:', e);
                    modalAlert(t('portReqFailed') + e.message);
                }
            }
        }

        // Show internal serial port picker (used in Electron desktop mode)
        function showSerialPortPicker(ports) {
            return new Promise((resolve) => {
                const items = ports.map((p, i) => {
                    const name = p.displayName || 'Serial Port';
                    const com = p.portName ? `(${p.portName})` : '';
                    const vid = p.vendorId ? `VID:${p.vendorId}` : '';
                    const pid = p.productId ? `PID:${p.productId}` : '';
                    const info = [vid, pid].filter(Boolean).join(' | ');
                    return `<div class="port-picker-item" data-index="${i}">
                        <span class="ppi-name">${name} ${com}</span>
                        <span class="ppi-info">${info || 'Unknown device'}</span>
                    </div>`;
                }).join('');

                modal.title.textContent = 'Select Serial Port';
                modal.body.innerHTML = `<div class="port-picker-list">${items}</div>`;
                modal.footer.innerHTML = '';
                modal.box.style.width = '500px';

                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'btn btn-secondary btn-sm';
                cancelBtn.textContent = 'Cancel';
                cancelBtn.style.minWidth = '70px';
                cancelBtn.addEventListener('click', () => { closeModal(); resolve(null); });
                modal.footer.appendChild(cancelBtn);

                modal.overlay.classList.add('open');

                // Click on an item selects it and confirms
                modal.body.addEventListener('click', (e) => {
                    const item = e.target.closest('.port-picker-item');
                    if (!item) return;
                    const idx = parseInt(item.dataset.index);
                    closeModal();
                    resolve(ports[idx]);
                });

                // Click overlay to cancel
                modal.overlay.addEventListener('click', (e) => {
                    if (e.target === modal.overlay) { closeModal(); resolve(null); }
                });
            });
        }

        function getSelectedPort() {
            return selectedPortIdx >= 0 && selectedPortIdx < portList.length ? portList[selectedPortIdx] : null;
        }

        async function connect() {
            // 保存当前的参数到该设备
            saveCurrentParamsToDevice();

            let targetPort = null;

            if (selectedPortIdx >= 0 && selectedPortIdx < portList.length) {
                targetPort = portList[selectedPortIdx];
            }

            if (!targetPort) {
                modalAlert(t('noPortSelected'));
                return;
            }

            const baudRate = parseInt(els.baudRate.value);
            const dataBits = parseInt(els.dataBits.value);
            const stopBits = parseFloat(els.stopBits.value);
            const parity = els.parity.value;

            const flowControl = [];
            if (els.flowRts.checked) flowControl.push('rts-cts');
            if (els.flowDtr.checked) flowControl.push('dtr-dsr');

            try {
                await targetPort.open({
                    baudRate,
                    dataBits,
                    stopBits,
                    parity,
                    flowControl: flowControl.length > 0 ? flowControl : undefined,
                });

                port = targetPort;
                connected = true;
                updateUI();

                // 启动读取
                keepReading = true;
                readLoop();

            } catch (e) {
                modalAlert(t('portOpenFailed') + e.message);
                console.error(e);
            }
        }

        async function disconnect() {
            keepReading = false;

            if (autoSendTimer) {
                clearInterval(autoSendTimer);
                autoSendTimer = null;
            }
            els.txAutoSend.checked = false;

            // 先关闭可写流
            if (port && port.writable) {
                try {
                    const w = port.writable.getWriter();
                    await w.close();
                } catch (_) { }
            }

            // 再取消读取
            if (reader) {
                try {
                    await reader.cancel();
                    reader.releaseLock();
                } catch (_) { }
                reader = null;
            }

            // 最后关闭串口
            if (port) {
                try {
                    await port.close();
                } catch (_) { }
                port = null;
            }

            connected = false;
            updateUI();
        }

        async function readLoop() {
            if (!port) return;

            while (port.readable && keepReading) {
                try {
                    reader = port.readable.getReader();
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        if (value) {
                            appendRx(value.buffer || value);
                        }
                    }
                } catch (e) {
                    if (keepReading) {
                        console.error('读取错误:', e);
                    }
                } finally {
                    try { reader.releaseLock(); } catch (_) { }
                }
            }
        }

        async function sendData(data) {
            if (!connected || !port || !port.writable) {
                modalAlert(t('portNotConnected'));
                return;
            }

            try {
                const w = port.writable.getWriter();
                await w.write(data);
                w.releaseLock();

                txCounter += data.byteLength;
                els.txCount.textContent = txCounter;

                // 在接收区回显发送的数据
                const txMode = els.rxDisplayMode.value;
                const showTs = els.rxTimestamp.checked;
                const display = formatData(data, txMode);
                const escaped = display.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const cssClass = txMode === 'hex' || txMode === 'hexascii' ? 'rx-hex' : 'rx-text';

                let line = '';
                if (showTs) {
                    line += `<span class="timestamp">[${getTimestamp()}]</span> `;
                }
                line += `<span class="rx-arrow">TX:</span> <span class="${cssClass}">${escaped}</span>`;

                els.rxArea.insertAdjacentHTML('beforeend', `<div class="rx-line">${line}</div>`);
                trimRx();
                if (els.rxAutoScroll.checked) {
                    els.rxArea.scrollTop = els.rxArea.scrollHeight;
                }

            } catch (e) {
                console.error('发送错误:', e);
                modalAlert(t('sendFailed') + e.message);
            }
        }

        // ============================================================
        //  UI 更新
        // ============================================================
        function updateUI() {
            // 同步自定义下拉禁用状态（通过 select 上保存的引用直接查找）
            const syncSelectDisabled = (id) => {
                const sel = document.getElementById(id);
                const container = sel?._customContainer;
                if (container) {
                    container.classList.toggle('custom-select-disabled', sel.disabled);
                }
            };
            if (connected) {
                els.btnConnect.textContent = t('closePort');
                els.btnConnect.className = 'btn btn-primary connected';
                els.statusBadge.textContent = t('connected');
                els.statusBadge.className = 'status-badge connected';
                els.btnSend.disabled = false;
                els.btnRequest.disabled = true;
                els.portTrigger.style.pointerEvents = 'none';
                els.portTrigger.style.opacity = '0.5';
                els.baudRate.disabled = true;
                els.dataBits.disabled = true;
                els.stopBits.disabled = true;
                els.parity.disabled = true;
                els.flowRts.disabled = true;
                els.flowDtr.disabled = true;
            } else {
                els.btnConnect.textContent = t('openPort');
                els.btnConnect.className = 'btn btn-primary';
                els.statusBadge.textContent = t('disconnected');
                els.statusBadge.className = 'status-badge disconnected';
                els.btnSend.disabled = false;
                els.btnRequest.disabled = false;
                els.portTrigger.style.pointerEvents = '';
                els.portTrigger.style.opacity = '';
                els.baudRate.disabled = false;
                els.dataBits.disabled = false;
                els.stopBits.disabled = false;
                els.parity.disabled = false;
                els.flowRts.disabled = false;
                els.flowDtr.disabled = false;

                if (autoSendTimer) {
                    clearInterval(autoSendTimer);
                    autoSendTimer = null;
                    els.txAutoSend.checked = false;
                }
            }
            // 强制同步自定义下拉禁用样式
            syncSelectDisabled('baudRate');
            syncSelectDisabled('dataBits');
            syncSelectDisabled('stopBits');
            syncSelectDisabled('parity');
        }

        // ============================================================
        //  事件绑定
        // ============================================================

        // 请求新串口
        els.btnRequest.addEventListener('click', async () => {
            await requestPort();
        });

        // 自动发送复选框
        els.txAutoSend.addEventListener('change', () => {
            if (els.txAutoSend.checked) {
                els.txAutoInterval.disabled = false;
                if (connected) {
                    const interval = parseInt(els.txAutoInterval.value);
                    autoSendTimer = setInterval(() => {
                        doSend();
                    }, interval);
                }
            } else {
                els.txAutoInterval.disabled = true;
                if (autoSendTimer) {
                    clearInterval(autoSendTimer);
                    autoSendTimer = null;
                }
            }
        });

        els.txAutoInterval.addEventListener('change', () => {
            if (autoSendTimer) {
                clearInterval(autoSendTimer);
                const interval = parseInt(els.txAutoInterval.value);
                autoSendTimer = setInterval(() => {
                    doSend();
                }, interval);
            }
        });

        // 连接/断开
        els.btnConnect.addEventListener('click', () => {
            if (connected) {
                disconnect();
            } else {
                connect();
            }
        });

        // 页面关闭前自动断开
        window.addEventListener('beforeunload', () => {
            if (connected) disconnect();
        });

        // 发送
        els.btnSend.addEventListener('click', doSend);

            if (e.key === 'Enter') {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    doSend();
                } else if (!connected) {
                    e.preventDefault();
                    modalAlert(t('portNotConnected'));
                }
            }
        });

        function doSend() {
            if (!connected) {
                modalAlert(t('portNotConnected'));
                return;
            }
            const text = els.txInput.value;
            if (!text) return;

            let data;
            if (els.txHexMode.checked) {
                const bytes = hexStringToBytes(text);
                if (!bytes) {
                    modalAlert(t('hexInvalidHint'));
                    return;
                }
                data = bytes;
            } else {
                let str = text;
                if (els.txAppendNewline.checked) {
                    str += '\n';
                }
                const encoder = new TextEncoder();
                data = encoder.encode(str);
            }

            sendData(data);
        }

        // ============================================================
        //  快捷发送
        // ============================================================
        const QS_KEY = 'serial_quick_sends';

        function loadQuickSends() {
            try { return JSON.parse(localStorage.getItem(QS_KEY) || '[]'); } catch { return []; }
        }

        function saveQuickSends(list) {
            localStorage.setItem(QS_KEY, JSON.stringify(list));
        }

        function renderQuickSends() {
            const grid = els.quickSendGrid;
            const list = loadQuickSends();
            grid.innerHTML = '';
            for (let i = 0; i < list.length; i++) {
                const item = document.createElement('div');
                item.className = 'qs-item';
                item.innerHTML = '<span class="qs-drag" draggable="true">\u283F</span>'
                    + '<input type="text" value="' + list[i].replace(/"/g, '&quot;') + '" spellcheck="false">'
                    + '<button class="qs-send">' + t('send') + '</button>'
                    + '<button class="qs-del">\uD83D\uDDD1</button>';
                const inp = item.querySelector('input');
                // Enter 发送
                inp.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') sendQuick(i, inp.value);
                });
                item.querySelector('.qs-send').addEventListener('click', () => sendQuick(i, inp.value));
                item.querySelector('.qs-del').addEventListener('click', () => {
                    const list2 = loadQuickSends();
                    list2.splice(i, 1);
                    saveQuickSends(list2);
                    renderQuickSends();
                });
                // 失去焦点时保存
                inp.addEventListener('change', () => {
                    const list2 = loadQuickSends();
                    list2[i] = inp.value;
                    saveQuickSends(list2);
                });
                // 拖拽排序（仅手柄可拖）
                const qsHandle = item.querySelector('.qs-drag');
                qsHandle.addEventListener('dragstart', (e) => {
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', i);
                    item.style.opacity = '0.4';
                });
                qsHandle.addEventListener('dragend', () => {
                    item.style.opacity = '';
                    grid.querySelectorAll('.qs-item.drag-over').forEach(el => el.classList.remove('drag-over'));
                });
                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    item.classList.add('drag-over');
                });
                item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    item.classList.remove('drag-over');
                    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                    const toIdx = i;
                    if (fromIdx !== toIdx) {
                        const list2 = loadQuickSends();
                        const [moved] = list2.splice(fromIdx, 1);
                        list2.splice(toIdx, 0, moved);
                        saveQuickSends(list2);
                        renderQuickSends();
                    }
                });
                grid.appendChild(item);
            }
        }

        function sendQuick(idx, text) {
            if (!text) return;
            let data;
            if (els.txHexMode.checked) {
                const bytes = hexStringToBytes(text);
                if (!bytes) { modalAlert(t('hexInvalid')); return; }
                data = bytes;
            } else {
                let str = text;
                if (els.txAppendNewline.checked) str += '\n';
                data = new TextEncoder().encode(str);
            }
            sendData(data);
        }

            for (let i = 0; i < inputs.length; i++) {
                if (inputs[i].value.trim() === '') {
                    inputs[i].classList.remove('flash-empty');
                    void inputs[i].offsetWidth; // 重置动画
                    inputs[i].classList.add('flash-empty');
                    inputs[i].addEventListener('animationend', function() { this.classList.remove('flash-empty'); }, { once: true });
                    inputs[i].focus();
                    return;
                }
            }
            list.push('');
            saveQuickSends(list);
            renderQuickSends();
            // 聚焦到新添加的输入框
            const newInputs = els.quickSendGrid.querySelectorAll('.qs-item input');
            if (newInputs.length > 0) newInputs[newInputs.length - 1].focus();

        // ============================================================
        const PERSIST_KEY = 'serial_app_settings';

        // 需要保存的控件： [el名称, 类型]  类型 'v'=value, 'c'=checked
        const PERSISTED_CONTROLS = [
            ['baudRate', 'v'], ['dataBits', 'v'], ['stopBits', 'v'], ['parity', 'v'],
            ['flowRts', 'c'], ['flowDtr', 'c'],
            ['rxDisplayMode', 'v'], ['rxTimestamp', 'c'], ['rxAutoScroll', 'c'], ['rxMaxLines', 'v'],
            ['txHexMode', 'c'], ['txAppendNewline', 'c'], ['txAutoInterval', 'v'],
        ];

        function saveSettings() {
            const obj = {};
            for (const [name, type] of PERSISTED_CONTROLS) {
                const el = els[name];
                if (el) obj[name] = type === 'c' ? el.checked : el.value;
            }
            // 保存标签
            obj.dataLabels = dataLabels.map(d => {
                const base = { prefix: d.prefix, mode: d.mode || 'label' };
                if (d.mode === 'led') { base.ledMode = d.ledMode; base.threshold = d.threshold; }
                return base;
            });
            obj.chartPrefixes = chartItems.map(c => ({ prefix: c.prefix, maxPoints: c.maxPoints || 50 }));
            try { localStorage.setItem(PERSIST_KEY, JSON.stringify(obj)); } catch { }
        }

        function loadSettings() {
            try {
                const raw = localStorage.getItem(PERSIST_KEY);
                if (!raw) return;
                const obj = JSON.parse(raw);
                for (const [name, type] of PERSISTED_CONTROLS) {
                    if (obj[name] === undefined) continue;
                    const el = els[name];
                    if (!el) continue;
                    if (type === 'c') el.checked = obj[name];
                    else el.value = obj[name];
                }
                // 恢复标签
                if (obj.dataLabels && Array.isArray(obj.dataLabels)) {
                    for (const item of obj.dataLabels) {
                        const prefix = typeof item === 'string' ? item : item.prefix;
                        const mode = item.mode || 'label';
                        addLabelFromStorage({ prefix, mode });
                    }
                    if (dataLabels.length > 0) startLabelTimer();
                }
                // 恢复曲线点图
                if (obj.chartPrefixes && Array.isArray(obj.chartPrefixes)) {
                    for (const item of obj.chartPrefixes) {
                        const prefix = typeof item === 'string' ? item : item.prefix;
                        const maxPoints = typeof item === 'string' ? 50 : (item.maxPoints || 50);
                        addChartFromStorage(prefix, maxPoints);
                    }
                    if (chartItems.length > 0) { renderChartPanel(); }
                }
            } catch { }
        }

        function addLabelFromStorage(item) {
            const prefix = typeof item === 'string' ? item : item.prefix;
            const mode = item.mode || 'label';
            const text = els.rxArea.textContent;
            const lines = text.split('\n');
            let val = 0, vmin = 0, vmax = 0;
            for (let i = lines.length - 1; i >= 0; i--) {
                const v = extractVal(lines[i], prefix);
                if (v !== null) {
                    val = v;
                    vmin = Math.min(vmin, val);
                    vmax = Math.max(vmax, val);
                    break;
                }
            }
            const idx = dataLabels.length;
            const entry = { prefix, value: val, min: vmin, max: vmax, mode };
            if (mode === 'led') { entry.ledMode = item.ledMode || 'bool'; entry.threshold = item.threshold || 0; }
            dataLabels.push(entry);
            const el = document.createElement('div');
            buildLabelElement(el, dataLabels[idx], idx);
            // 恢复的标签也加上拖拽
            const handle = el.querySelector('.dp-drag');
            const panel = els.rxDataPanel;
            handle.addEventListener('dragstart', (e) => {
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', idx);
                el.style.opacity = '0.4';
            });
            handle.addEventListener('dragend', () => {
                el.style.opacity = '';
                panel.querySelectorAll('.dp-item.drag-over').forEach(el => el.classList.remove('drag-over'));
            });
            el.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; el.classList.add('drag-over'); });
            el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
            el.addEventListener('drop', (e) => {
                e.preventDefault(); el.classList.remove('drag-over');
                const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                const toIdx = idx;
                if (fromIdx !== toIdx) {
                    const [moved] = dataLabels.splice(fromIdx, 1);
                    dataLabels.splice(toIdx, 0, moved);
                    saveSettings();
                    renderDataPanel();
                }
            });
            els.rxDataPanel.appendChild(el);
            els.rxDataPanel.classList.add('visible');

        function showModal(opts) {
            return new Promise((resolve) => {
                modal.title.textContent = opts.title || '';
                modal.body.innerHTML = opts.html || '';
                modal.footer.innerHTML = '';
                if (opts.width) modal.box.style.width = opts.width;

                if (opts.cancelText !== false) {
                    const cancelBtn = document.createElement('button');
                    cancelBtn.className = 'btn btn-secondary btn-sm';
                    cancelBtn.textContent = opts.cancelText || t('cancel');
                    cancelBtn.style.minWidth = '70px';
                    cancelBtn.addEventListener('click', () => { closeModal(); resolve(null); });
                    modal.footer.appendChild(cancelBtn);
                }

                if (opts.confirmText !== false) {
                    const confirmBtn = document.createElement('button');
                    confirmBtn.className = 'btn btn-primary btn-sm';
                    confirmBtn.textContent = opts.confirmText || t('confirm');
                    confirmBtn.style.minWidth = '70px';
                    confirmBtn.addEventListener('click', () => {
                        const val = opts.getValue ? opts.getValue() : true;
                        closeModal();
                        resolve(val);
                    });
                    modal.footer.appendChild(confirmBtn);
                }

                modal.overlay.classList.add('open');
                const firstInput = modal.body.querySelector('input,select');
                if (firstInput) setTimeout(() => firstInput.focus(), 50);

                const keyHandler = (e) => {
                    if (e.key === 'Enter') {
                        const val = opts.getValue ? opts.getValue() : true;
                        closeModal();
                        resolve(val);
                    }
                };
                document.addEventListener('keydown', keyHandler);
                modal.overlay.addEventListener('click', (e) => {
                    if (e.target === modal.overlay) { closeModal(); resolve(null); }
                });
            });
        }

        let currentLang = localStorage.getItem('serial_lang') || 'en';

        function t(key, ...args) {
            const dict = LANG[currentLang] || LANG['en'];
            let str = dict[key];
            if (str === undefined) str = LANG['en'][key]; // fallback to English
            if (str === undefined) return key;
            if (args.length) str = str.replace(/\{(\d+)\}/g, (m, i) => args[i] !== undefined ? args[i] : m);
            return str;
        }

        function applyLang(lang) {
            currentLang = lang;
            localStorage.setItem('serial_lang', lang);
            document.title = t('title');
            document.querySelector('.header h1').textContent = t('title');
            // 更新各静态标签及连接状态文字
            applyLangToPage();
            updateUI();
            // 更新曲线图卡片中的文字（"单页绘制点数"）
            renderChartPanel();
            // 更新快捷发送按钮文字（"发送"）
            document.querySelectorAll('.qs-send').forEach(el => el.textContent = t('send'));
            // 重绘曲线图内容
            chartItems.forEach(item => drawChart(item));
        }

        function applyLangToPage() {
            // 通过 data-i18n 属性批量更新
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                    if (el.dataset.i18nType === 'placeholder') el.placeholder = t(key);
                } else if (el.tagName === 'OPTION') {
                    el.textContent = t(key);
                } else {
                    el.textContent = t(key);
                }
            });
            // 更新 data-i18n-title 元素（按钮提示）
            document.querySelectorAll('[data-i18n-title]').forEach(el => {
                el.title = t(el.dataset.i18nTitle);
            });
            // 同步自定义下拉框触发器文字和选项列表
            document.querySelectorAll('select[data-_converted]').forEach(sel => {
                const container = sel._customContainer;
                if (!container) return;
                const textSpan = container.querySelector('.select-trigger > span:first-child');
                if (textSpan) {
                    textSpan.textContent = sel.options[sel.selectedIndex]?.text || sel.value;
                }
                // 同步下拉选项列表
                const items = container.querySelectorAll('.select-item');
                items.forEach(item => {
                    const opt = Array.from(sel.options).find(o => o.value === item.dataset.value);
                    if (opt) item.textContent = opt.text;
                });
            });
            // 更新串口下拉占位文字（如已选择端口则保持端口名）
            if (selectedPortIdx < 0 || selectedPortIdx >= portList.length) {
                els.portPlaceholder.textContent = t('placeholder');
            }
            // 更新串口列表中无端口提示
            const emptyMsg = els.portDropdown.querySelector('.select-empty');
            if (emptyMsg) emptyMsg.textContent = t('noAuthorizedPort');
        }

        function showLangModal() {
            const langs = [
                ['zh-cn','🇨🇳 中文'], ['en','🇬🇧 English'], ['ja','🇯🇵 日本語'],
                ['ko','🇰🇷 한국어'], ['fr','🇫🇷 Français'], ['de','🇩🇪 Deutsch'],
                ['es','🇪🇸 Español'], ['pt','🇧🇷 Português'],
            ];
            const html = '<div style="display:flex;flex-wrap:wrap;gap:6px;">'
                + langs.map(([code, label]) =>
                    '<div class="theme-option' + (currentLang === code ? ' theme-selected' : '') + '" data-lang="' + code + '" style="flex-direction:row;gap:6px;cursor:pointer;min-width:120px;">' + label + '</div>'
                ).join('')
                + '</div>';
            showModal({ title: t('langTitle'), html, confirmText: false, cancelText: t('close') });
            setTimeout(() => {
                document.querySelectorAll('.theme-option[data-lang]').forEach(el => {
                    el.addEventListener('click', () => {
                        switchLang(el.dataset.lang);
                        closeModal();
                    });
                });
            }, 50);
        }

        function switchLang(lang) {
            applyLang(lang);
            document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('theme-selected'));
        }

        // 启动时应用已保存的语言
        applyLang(currentLang);

        // 检查 Web Serial API 支持
        if (!navigator.serial) {
            document.body.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0d1117;color:#e6edf3;text-align:center;padding:40px;">
                    <h1 style="color:#58a6ff;margin-bottom:20px;">浏览器不支持 Web Serial API</h1>
                    <p style="font-size:16px;max-width:500px;line-height:1.8;">
                        请使用基于 Chromium 的浏览器（如 <strong>Chrome</strong>、<strong>Edge</strong> 或 <strong>Opera</strong>）打开此页面。<br><br>
                        当前浏览器不支持串口通信功能。
                    </p>
                </div>
            `;
        }

        console.log('串口调试助手已加载');
        console.log('提示：点击"请求"按钮，在弹出的对话框中选择串口设备。');
